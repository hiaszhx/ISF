seed: 42
experiment:
  task: fusion   # image | spectrum | fusion
  output_dir: outputs
  run_name: baseline

data:
  root_dir: datasets
  image_extensions: [".png", ".jpg", ".jpeg", ".bmp", ".tif", ".tiff"]
  image_size: 64
  spectrum_length: 1800
  spectrum_left: 400       # 光谱左边界(横坐标)，null=不截取
  spectrum_right: 2200      # 光谱右边界(横坐标)，null=不截取
  val_ratio: 0.2
  test_ratio: 0.1
  strict_pair: true
  split:
    mode: time_order           # time_order | stratified_random
    shuffle_before_split: false # mode=time_order 时: true=先打乱再分配, false=按时间直接分配

train:
  epochs: 100
  batch_size: 32
  num_workers: 8
  lr: 0.0001
  weight_decay: 0.0001
  device: auto
  test_weights: best       # best | best_loss | last  (best=最优验证准确率, best_loss=最优验证损失, last=最后一轮)
  label_smoothing: 0.1     # 标签平滑系数，0.0=不使用
  optimizer: adamw          # adam | adamw
  scheduler: none         # none | cosine | plateau | step
  scheduler_params:
    T_max: auto             # cosine: 周期epoch数，auto=自动等于epochs
    eta_min: 0.000001       # cosine: 最低学习率
    factor: 0.5             # plateau: 学习率缩减倍率
    patience: 5             # plateau: 等待epoch数
    step_size: 10           # step: 每隔step_size个epoch降一次
    gamma: 0.5              # step: 衰减系数

model:
  image_model: mobilenetv2      # simple_cnn | resnet18 | mobilenetv2 | image_attn
  spectrum_model: gadf_cnn_64 # spectrum_cnn | spectrum_mlp | spectranet_attn | gadf_cnn_64 | gadf_cnn_128
                              # gadf_mamba_64 | gadf_mamba_128 | gadf_mamba_attn_64 | gadf_mamba_attn_128
  fusion_model: cross_attention_fusion # concat_fusion | cross_attention_fusion | multiscale_fusion
  num_classes: auto
