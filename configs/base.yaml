seed: 42
experiment:
  task: fusion   # image | spectrum | fusion
  output_dir: outputs
  run_name: baseline

data:
  root_dir: datasets
  image_extensions: [".png", ".jpg", ".jpeg", ".bmp", ".tif", ".tiff"]
  image_size: 64
  spectrum_length: 512
  val_ratio: 0.2
  test_ratio: 0.1
  strict_pair: false
  split:
    mode: stratified_random           # time_order | stratified_random
    shuffle_before_split: false # mode=time_order 时: true=先打乱再分配, false=按时间直接分配

train:
  epochs: 50
  batch_size: 32
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  device: auto

model:
  image_model: simple_cnn      # simple_cnn | resnet18 | mobilenetv2 | image_attn
  spectrum_model: spectrum_cnn # spectrum_cnn | spectrum_mlp | spectranet_attn
  fusion_model: concat_fusion
  num_classes: auto
