seed: 42
experiment:
  task: fusion   # image | spectrum | fusion
  output_dir: outputs
  run_name: baseline

data:
  root_dir: datasets
  image_extensions: [".png", ".jpg", ".jpeg", ".bmp", ".tif", ".tiff"]
  image_size: 64
  spectrum_length: 1800
  val_ratio: 0.2
  test_ratio: 0.1
  strict_pair: false
  split:
    mode: stratified_random           # time_order | stratified_random
    shuffle_before_split: false # mode=time_order 时: true=先打乱再分配, false=按时间直接分配

train:
  epochs: 100
  batch_size: 32
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  device: auto
  test_weights: best       # best | last  (best=使用验证集最优权重测试, last=使用最后一轮权重测试)
  optimizer: adamw          # adam | adamw
  scheduler: none         # none | cosine | plateau | step
  scheduler_params:
    T_max: auto             # cosine: 周期epoch数，auto=自动等于epochs
    eta_min: 0.000001       # cosine: 最低学习率
    factor: 0.5             # plateau: 学习率缩减倍率
    patience: 5             # plateau: 等待epoch数
    step_size: 10           # step: 每隔step_size个epoch降一次
    gamma: 0.5              # step: 衰减系数

model:
  image_model: image_attn      # simple_cnn | resnet18 | mobilenetv2 | image_attn
  spectrum_model: gadf_cnn_64 # spectrum_cnn | spectrum_mlp | spectranet_attn | gadf_cnn_64 | gadf_cnn_128
  fusion_model: cross_attention_fusion # concat_fusion | cross_attention_fusion
  num_classes: auto
